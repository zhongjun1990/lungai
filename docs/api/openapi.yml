components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT authentication using Bearer tokens.
        Obtain a token via /auth/login endpoint.

  parameters:
    page:
      name: page
      in: query
      description: Page number (1-based)
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    per_page:
      name: per_page
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    # ========== Request/Response Envelopes ==========
    BaseResponse:
      type: object
      properties:
        data:
          description: Response data
        meta:
          type: object
          description: Pagination metadata
          properties:
            total:
              type: integer
              description: Total number of items
            page:
              type: integer
              description: Current page number
            per_page:
              type: integer
              description: Number of items per page
        links:
          type: object
          description: Pagination links
          properties:
            self:
              type: string
              format: uri
              description: Link to current page
            next:
              type: string
              format: uri
              nullable: true
              description: Link to next page
            prev:
              type: string
              format: uri
              nullable: true
              description: Link to previous page
            first:
              type: string
              format: uri
              description: Link to first page
            last:
              type: string
              format: uri
              description: Link to last page

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_parameter
                - missing_parameter
                - invalid_credentials
                - insufficient_permissions
                - resource_not_found
                - duplicate_resource
                - resource_conflict
                - rate_limit_exceeded
                - server_error
                - service_unavailable
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: string
              description: Additional error details (optional)
            request_id:
              type: string
              format: uuid
              description: Unique request identifier for debugging
          example:
            code: invalid_parameter
            message: The 'study_uid' parameter is required
            details: Missing required query parameter
            request_id: 123e4567-e89b-12d3-a456-426614174001

    # ========== Authentication ==========
    LoginRequest:
      type: object
      required:
        - email
        - password
        - tenant_id
      properties:
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          format: password
          description: User's password
        tenant_id:
          type: string
          format: uuid
          description: Tenant/Organization ID

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - access_token
            - refresh_token
            - token_type
            - expires_in
          properties:
            access_token:
              type: string
              description: JWT access token for API authentication
            refresh_token:
              type: string
              description: Token to refresh the access token
            token_type:
              type: string
              enum: [Bearer]
              description: Token type (always Bearer)
            expires_in:
              type: integer
              description: Access token expiration in seconds (default 3600)
          example:
            access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            token_type: Bearer
            expires_in: 3600

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh token from previous login

    # ========== Users ==========
    User:
      type: object
      required:
        - id
        - email
        - full_name
        - role
        - tenant_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: User UUID
        email:
          type: string
          format: email
          description: User's email address
        full_name:
          type: string
          description: User's full name
        role:
          type: string
          enum: [admin, radiologist, technician, viewer]
          description: User's role
        tenant_id:
          type: string
          format: uuid
          description: Tenant/Organization ID
        status:
          type: string
          enum: [active, inactive, suspended]
          description: Account status
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        last_login_at:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
          description: Updated full name

    # ========== Patients ==========
    Patient:
      type: object
      required:
        - id
        - mrn
        - first_name
        - last_name
        - birth_date
        - gender
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Patient UUID
        mrn:
          type: string
          description: Medical Record Number
        first_name:
          type: string
          description: Patient's first name
        last_name:
          type: string
          description: Patient's last name
        birth_date:
          type: string
          format: date
          description: Patient's date of birth
        gender:
          type: string
          enum: [male, female, other, unknown]
          description: Patient's gender
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    PatientResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Patient'

    PatientListResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Patient'

    CreatePatientRequest:
      type: object
      required:
        - mrn
        - first_name
        - last_name
        - birth_date
        - gender
      properties:
        mrn:
          type: string
          description: Medical Record Number
        first_name:
          type: string
          description: Patient's first name
        last_name:
          type: string
          description: Patient's last name
        birth_date:
          type: string
          format: date
          description: Patient's date of birth
        gender:
          type: string
          enum: [male, female, other, unknown]
          description: Patient's gender

    UpdatePatientRequest:
      type: object
      properties:
        mrn:
          type: string
          description: Updated MRN
        first_name:
          type: string
          description: Updated first name
        last_name:
          type: string
          description: Updated last name
        birth_date:
          type: string
          format: date
          description: Updated date of birth
        gender:
          type: string
          enum: [male, female, other, unknown]
          description: Updated gender

    # ========== Studies ==========
    Study:
      type: object
      required:
        - id
        - patient_id
        - study_date
        - modality
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Study UUID
        study_instance_uid:
          type: string
          description: DICOM Study Instance UID
        patient_id:
          type: string
          format: uuid
          description: Patient UUID
        study_date:
          type: string
          format: date
          description: Study date
        study_time:
          type: string
          format: time
          nullable: true
          description: Study time
        modality:
          type: string
          description: Modality (CT, MR, CR, DX, etc.)
        body_part:
          type: string
          nullable: true
          description: Body part examined
        description:
          type: string
          nullable: true
          description: Study description
        physician_name:
          type: string
          nullable: true
          description: Referring physician name
        status:
          type: string
          enum: [pending, processing, completed, archived]
          description: Study status
        series_count:
          type: integer
          description: Number of series in the study
        instance_count:
          type: integer
          description: Number of instances in the study
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    StudyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Study'

    StudyListResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Study'

    StudyDetailResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/Study'
            - type: object
              properties:
                series:
                  type: array
                  items:
                    $ref: '#/components/schemas/Series'
                  description: Series included in the study

    CreateStudyRequest:
      type: object
      required:
        - patient_id
        - study_date
        - modality
      properties:
        study_instance_uid:
          type: string
          description: DICOM Study Instance UID
        patient_id:
          type: string
          format: uuid
          description: Patient UUID
        study_date:
          type: string
          format: date
          description: Study date
        study_time:
          type: string
          format: time
          nullable: true
          description: Study time
        modality:
          type: string
          description: Modality (CT, MR, CR, DX, etc.)
        body_part:
          type: string
          nullable: true
          description: Body part examined
        description:
          type: string
          nullable: true
          description: Study description
        physician_name:
          type: string
          nullable: true
          description: Referring physician name

    UpdateStudyRequest:
      type: object
      properties:
        body_part:
          type: string
          description: Updated body part
        description:
          type: string
          description: Updated study description
        physician_name:
          type: string
          description: Updated physician name
        status:
          type: string
          enum: [pending, processing, completed, archived]
          description: Updated study status

    # ========== Series ==========
    Series:
      type: object
      required:
        - id
        - study_id
        - series_number
        - modality
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Series UUID
        study_id:
          type: string
          format: uuid
          description: Study UUID
        series_instance_uid:
          type: string
          description: DICOM Series Instance UID
        series_number:
          type: integer
          description: Series number
        modality:
          type: string
          description: Modality
        description:
          type: string
          nullable: true
          description: Series description
        number_of_instances:
          type: integer
          description: Number of instances in the series
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp

    SeriesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Series'

    # ========== Instances ==========
    Instance:
      type: object
      required:
        - id
        - series_id
        - file_location
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Instance UUID
        series_id:
          type: string
          format: uuid
          description: Series UUID
        sop_instance_uid:
          type: string
          description: DICOM SOP Instance UID
        instance_number:
          type: integer
          nullable: true
          description: Instance number
        file_location:
          type: string
          description: Object storage file path
        file_size:
          type: integer
          format: int64
          nullable: true
          description: File size in bytes
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp

    InstanceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Instance'

    GetUploadUrlRequest:
      type: object
      required:
        - study_instance_uid
        - series_instance_uid
        - sop_instance_uid
        - filename
        - content_type
      properties:
        study_instance_uid:
          type: string
          description: DICOM Study Instance UID
        series_instance_uid:
          type: string
          description: DICOM Series Instance UID
        sop_instance_uid:
          type: string
          description: DICOM SOP Instance UID
        filename:
          type: string
          description: Original filename
        content_type:
          type: string
          description: File content type

    GetUploadUrlResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - upload_url
            - upload_method
            - expires_in
          properties:
            upload_url:
              type: string
              format: uri
              description: Pre-signed upload URL
            upload_method:
              type: string
              enum: [PUT, POST]
              description: HTTP method to use for upload
            expires_in:
              type: integer
              description: URL expiration in seconds
            upload_headers:
              type: object
              additionalProperties:
                type: string
              description: Required headers for upload

    # ========== Analysis Tasks ==========
    AnalysisTask:
      type: object
      required:
        - id
        - study_id
        - model_id
        - model_version
        - status
        - priority
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Task UUID
        study_id:
          type: string
          format: uuid
          description: Study UUID
        model_id:
          type: string
          description: AI model identifier
        model_version:
          type: string
          description: Model version
        status:
          type: string
          enum: [pending, queued, processing, completed, failed, cancelled]
          description: Task status
        priority:
          type: integer
          description: Priority (higher = more urgent)
        parameters:
          type: object
          nullable: true
          description: Model-specific parameters
        error_message:
          type: string
          nullable: true
          description: Error message if failed
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Processing start time
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: Processing completion time
        created_at:
          type: string
          format: date-time
          description: Task creation timestamp

    AnalysisTaskResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AnalysisTask'

    AnalysisTaskListResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisTask'

    AnalysisTaskDetailResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/AnalysisTask'

    AnalysisTaskStatusResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - id
            - status
          properties:
            id:
              type: string
              format: uuid
              description: Task UUID
            status:
              type: string
              enum: [pending, queued, processing, completed, failed, cancelled]
              description: Current status
            progress:
              type: integer
              nullable: true
              minimum: 0
              maximum: 100
              description: Progress percentage
            started_at:
              type: string
              format: date-time
              nullable: true
              description: Processing start time
            estimated_completion:
              type: string
              format: date-time
              nullable: true
              description: Estimated completion time

    AnalysisResultsResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - id
            - task_id
            - model_id
            - model_version
            - created_at
          properties:
            id:
              type: string
              format: uuid
              description: Result UUID
            task_id:
              type: string
              format: uuid
              description: Analysis task UUID
            model_id:
              type: string
              description: AI model identifier
            model_version:
              type: string
              description: Model version
            findings:
              type: array
              items:
                type: object
                required:
                  - type
                  - confidence
                properties:
                  type:
                    type: string
                    description: Finding type (tumor, nodule, lesion, etc.)
                  confidence:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                    description: Confidence score
                  bbox:
                    type: object
                    required:
                      - x
                      - y
                      - width
                      - height
                    properties:
                      x:
                        type: number
                      y:
                        type: number
                      width:
                        type: number
                      height:
                        type: number
                    description: Bounding box coordinates
                  volume:
                    type: number
                    format: float
                    nullable: true
                    description: Estimated volume in cm³
                  description:
                    type: string
                    nullable: true
                    description: Human-readable description
              description: AI findings
            visualization_url:
              type: string
              format: uri
              nullable: true
              description: URL for visualization overlay
            report_text:
              type: string
              nullable: true
              description: Generated report text
            metrics:
              type: object
              properties:
                inference_time_ms:
                  type: integer
                  description: Total inference time in milliseconds
              description: Performance metrics
            created_at:
              type: string
              format: date-time
              description: Result creation timestamp

    SubmitAnalysisTaskRequest:
      type: object
      required:
        - study_id
        - model_id
        - model_version
      properties:
        study_id:
          type: string
          format: uuid
          description: Study UUID to analyze
        model_id:
          type: string
          description: AI model identifier
        model_version:
          type: string
          description: Model version
        parameters:
          type: object
          nullable: true
          description: Model-specific parameters
        priority:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: Priority (1-10, higher = more urgent)

    # ========== Reports ==========
    Report:
      type: object
      required:
        - id
        - study_id
        - analysis_task_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Report UUID
        study_id:
          type: string
          format: uuid
          description: Study UUID
        analysis_task_id:
          type: string
          format: uuid
          description: Analysis task UUID
        template_id:
          type: string
          nullable: true
          description: Template used for generation
        status:
          type: string
          enum: [draft, review, approved, signed, archived]
          description: Report status
        signed_by:
          type: string
          format: uuid
          nullable: true
          description: User who signed the report
        signed_at:
          type: string
          format: date-time
          nullable: true
          description: Signing timestamp
        created_at:
          type: string
          format: date-time
          description: Report creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    ReportResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Report'

    ReportListResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Report'

    ReportDetailResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/Report'
            - type: object
              properties:
                content:
                  type: object
                  description: Report content (JSON structure)

    GenerateReportRequest:
      type: object
      required:
        - analysis_task_id
      properties:
        analysis_task_id:
          type: string
          format: uuid
          description: Analysis task UUID
        template_id:
          type: string
          nullable: true
          description: Template to use for generation
        parameters:
          type: object
          nullable: true
          description: Template-specific parameters

    UpdateReportRequest:
      type: object
      properties:
        content:
          type: object
          description: Updated report content
        status:
          type: string
          enum: [draft, review, approved, signed, archived]
          description: Updated report status

    # ========== System ==========
    SystemStatusResponse:
      type: object
      properties:
        data:
          type: object
          required:
            - status
            - version
            - uptime
          properties:
            status:
              type: string
              enum: [healthy, warning, critical]
              description: Overall system status
            version:
              type: string
              description: API version
            uptime:
              type: integer
              format: int64
              description: Uptime in seconds
            services:
              type: array
              items:
                type: object
                required:
                  - name
                  - status
                properties:
                  name:
                    type: string
                    description: Service name
                  status:
                    type: string
                    enum: [healthy, warning, critical]
                    description: Service status
                  response_time_ms:
                    type: integer
                    nullable: true
                    description: Average response time in milliseconds
              description: Individual service statuses
            resources:
              type: object
              properties:
                cpu:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: CPU utilization (0-1)
                memory:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Memory utilization (0-1)
                gpu:
                  type: object
                  nullable: true
                  properties:
                    memory:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
                    utilization:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 1
                  description: GPU utilization (if available)
              description: System resource utilization
