openapi: 3.0.3
info:
  title: AI Medical Imaging Analysis API
  description: |
    RESTful API for the AI Medical Imaging Analysis SaaS platform.
    This API provides endpoints for managing patients, studies, imaging data,
    AI analysis tasks, reports, and system administration.

    ## Authentication

    All API requests (except the login endpoint) require authentication using
    Bearer tokens obtained via the `/v1/auth/login` endpoint.

    Include the token in the Authorization header:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Versioning

    API version is included in the URL path. This specification documents version 1.

    ## Rate Limiting

    The API implements rate limiting. Clients exceeding the rate limit will
    receive a 429 Too Many Requests response.

    - Default: 1000 requests per minute
    - File upload: 100 requests per minute

    ## Response Format

    All successful responses follow this format:
    ```json
    {
      "data": { /* response data */ },
      "meta": { /* pagination and metadata */ },
      "links": { /* pagination links */ }
    }
    ```

    Error responses follow this format:
    ```json
    {
      "error": {
        "code": "error_code",
        "message": "Human readable error message",
        "details": "Additional details (optional)",
        "request_id": "request-uuid"
      }
    }
    ```

  version: 1.0.0
  contact:
    name: API Support
    email: api-support@medical-imaging.example.com
    url: https://medical-imaging.example.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://medical-imaging.example.com/terms

servers:
  - url: https://api.medical-imaging.example.com/v1
    description: Production server
  - url: https://staging-api.medical-imaging.example.com/v1
    description: Staging server
  - url: http://localhost:8000/v1
    description: Local development server

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User profile and account management
  - name: Patients
    description: Patient information management
  - name: Studies
    description: Imaging studies and examination records
  - name: Series
    description: Imaging series and series metadata
  - name: Instances
    description: DICOM instances and file operations
  - name: Analysis
    description: AI analysis tasks and results
  - name: Reports
    description: Report generation and management
  - name: System
    description: System administration and health checks
  - name: FHIR
    description: FHIR (Fast Healthcare Interoperability Resources) endpoints
  - name: DICOMweb
    description: DICOMweb standard endpoints (WADO-RS, QIDO-RS, STOW-RS)

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate a user with email and password to receive access tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              Doctor:
                value:
                  email: doctor@hospital.com
                  password: "secure-password-123"
                  tenant_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
              Admin:
                value:
                  email: admin@hospital.com
                  password: "admin-password-123"
                  tenant_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
      responses:
        '200':
          description: Successful login
          headers:
            X-Request-ID:
              description: Unique request identifier for debugging
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use a refresh token to obtain a new access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate the current access token
      operationId: logout
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information
      operationId: getCurrentUser
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    patch:
      tags:
        - Users
      summary: Update current user profile
      description: Update the authenticated user's profile information
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /patients:
    get:
      tags:
        - Patients
      summary: List patients
      description: Retrieve a paginated list of patients with optional filtering and search
      operationId: listPatients
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: query
          in: query
          description: Search query for patient name or MRN
          required: false
          schema:
            type: string
        - name: sort_by
          in: query
          description: Field to sort by
          required: false
          schema:
            type: string
            enum: [created_at, last_name, birth_date]
            default: created_at
        - name: sort_order
          in: query
          description: Sort order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Patients
      summary: Create a patient
      description: Create a new patient record
      operationId: createPatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created successfully
          headers:
            Location:
              description: URL of the created patient
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /patients/{patient_id}:
    parameters:
      - name: patient_id
        in: path
        description: Patient UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Patients
      summary: Get patient details
      description: Retrieve detailed information about a specific patient
      operationId: getPatient
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    patch:
      tags:
        - Patients
      summary: Update patient
      description: Update an existing patient's information
      operationId: updatePatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /studies:
    get:
      tags:
        - Studies
      summary: List studies
      description: Retrieve a paginated list of imaging studies
      operationId: listStudies
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: patient_id
          in: query
          description: Filter by patient ID
          required: false
          schema:
            type: string
            format: uuid
        - name: modality
          in: query
          description: Filter by modality (CT, MR, CR, DX, etc.)
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Filter by study status
          required: false
          schema:
            type: string
            enum: [pending, processing, completed, archived]
        - name: start_date
          in: query
          description: Filter by study date (start, inclusive)
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter by study date (end, inclusive)
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Studies
      summary: Create a study
      description: Create a new imaging study record
      operationId: createStudy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudyRequest'
      responses:
        '201':
          description: Study created successfully
          headers:
            Location:
              description: URL of the created study
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /studies/{study_id}:
    parameters:
      - name: study_id
        in: path
        description: Study UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Studies
      summary: Get study details
      description: Retrieve detailed information about a specific study including its series
      operationId: getStudy
      parameters:
        - name: include_series
          in: query
          description: Include series details in response
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Study not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    patch:
      tags:
        - Studies
      summary: Update study
      description: Update an existing study's information
      operationId: updateStudy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudyRequest'
      responses:
        '200':
          description: Study updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Study not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /studies/{study_id}/series:
    parameters:
      - name: study_id
        in: path
        description: Study UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Series
      summary: List series for a study
      description: Retrieve all series belonging to a specific study
      operationId: listStudySeries
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Study not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /instances/upload-url:
    post:
      tags:
        - Instances
      summary: Get pre-signed upload URL
      description: Request a pre-signed URL for uploading a DICOM instance directly to object storage
      operationId: getUploadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUploadUrlRequest'
      responses:
        '200':
          description: Pre-signed URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUploadUrlResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /instances/{instance_id}:
    parameters:
      - name: instance_id
        in: path
        description: Instance UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Instances
      summary: Get instance details
      description: Retrieve metadata about a specific DICOM instance
      operationId: getInstance
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /instances/{instance_id}/thumbnail:
    parameters:
      - name: instance_id
        in: path
        description: Instance UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Instances
      summary: Get instance thumbnail
      description: Retrieve a thumbnail image of a DICOM instance
      operationId: getInstanceThumbnail
      parameters:
        - name: width
          in: query
          description: Thumbnail width in pixels
          required: false
          schema:
            type: integer
            minimum: 64
            maximum: 1024
            default: 256
        - name: height
          in: query
          description: Thumbnail height in pixels
          required: false
          schema:
            type: integer
            minimum: 64
            maximum: 1024
            default: 256
        - name: format
          in: query
          description: Image format
          required: false
          schema:
            type: string
            enum: [jpeg, png]
            default: jpeg
      responses:
        '200':
          description: Thumbnail image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /analysis-tasks:
    get:
      tags:
        - Analysis
      summary: List analysis tasks
      description: Retrieve a paginated list of AI analysis tasks
      operationId: listAnalysisTasks
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: study_id
          in: query
          description: Filter by study ID
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by task status
          required: false
          schema:
            type: string
            enum: [pending, queued, processing, completed, failed, cancelled]
        - name: model_id
          in: query
          description: Filter by model ID
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisTaskListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Analysis
      summary: Submit analysis task
      description: Submit a new AI analysis task for a study
      operationId: submitAnalysisTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnalysisTaskRequest'
            examples:
              BrainTumorDetection:
                value:
                  study_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                  model_id: "brain-tumor-detection"
                  model_version: "1.0.0"
                  parameters:
                    threshold: 0.7
                    use_tta: true
                  priority: 5
              LungNoduleDetection:
                value:
                  study_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                  model_id: "lung-nodule-detection"
                  model_version: "1.2.0"
                  priority: 3
      responses:
        '202':
          description: Task submitted successfully
          headers:
            Location:
              description: URL to check task status
              schema:
                type: string
                format: uri
            X-Status-URL:
              description: URL to check task status
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisTaskResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Study not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /analysis-tasks/{task_id}:
    parameters:
      - name: task_id
        in: path
        description: Analysis task UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Analysis
      summary: Get analysis task details
      description: Retrieve detailed information about a specific analysis task
      operationId: getAnalysisTask
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisTaskDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    delete:
      tags:
        - Analysis
      summary: Cancel analysis task
      description: Cancel a pending or queued analysis task
      operationId: cancelAnalysisTask
      responses:
        '204':
          description: Task cancelled successfully
        '400':
          description: Task cannot be cancelled (already in progress or completed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /analysis-tasks/{task_id}/status:
    parameters:
      - name: task_id
        in: path
        description: Analysis task UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Analysis
      summary: Get task status
      description: Retrieve the current status and progress of an analysis task
      operationId: getAnalysisTaskStatus
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisTaskStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /analysis-tasks/{task_id}/results:
    parameters:
      - name: task_id
        in: path
        description: Analysis task UUID
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Analysis
      summary: Get analysis results
      description: Retrieve the analysis results for a completed task
      operationId: getAnalysisTaskResults
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResultsResponse'
        '400':
          description: Task not completed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /reports:
    get:
      tags:
        - Reports
      summary: List reports
      description: Retrieve a paginated list of generated reports
      operationId: listReports
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
        - name: study_id
          in: query
          description: Filter by study ID
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by report status
          required: false
          schema:
            type: string
            enum: [draft, review, approved, signed, archived]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

    post:
      tags:
        - Reports
      summary: Generate a report
      description: Generate a report from an analysis result using a template
      operationId: generateReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '201':
          description: Report generated successfully
          headers:
            Location:
              description: URL of the generated report
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis result not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []

  /reports/{report_id}:
