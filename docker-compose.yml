version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-medical-postgres
    environment:
      POSTGRES_DB: medical_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-medical-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # MinIO 对象存储 (S3 兼容)
  minio:
    image: minio/minio:latest
    container_name: ai-medical-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # MongoDB 文档数据库
  mongodb:
    image: mongo:6.0
    container_name: ai-medical-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: medical_metadata
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --username admin --password password123 --authenticationDatabase admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.8.2
    container_name: ai-medical-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # Kibana (Elasticsearch 可视化)
  kibana:
    image: kibana:8.8.2
    container_name: ai-medical-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ai-medical-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
      RABBITMQ_DEFAULT_VHOST: medical-vhost
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # pgAdmin (PostgreSQL 管理工具)
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: ai-medical-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: password123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/login"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

  # MongoDB Express (MongoDB 管理工具)
  mongo-express:
    image: mongo-express:1.0.0-alpha.4
    container_name: ai-medical-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-medical-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mongodb_data:
  elasticsearch_data:
  rabbitmq_data:
  pgadmin_data:

networks:
  ai-medical-network:
    driver: bridge
